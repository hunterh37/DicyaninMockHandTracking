name: GloveDemo
options:
  bundleIdPrefix: com.dicyanin.glovedemo
  deploymentTarget:
    visionOS: "1.0"
  createIntermediateGroups: true

packages:
  DicyaninMockHandTracking:
    path: ../..

targets:
  GloveDemo:
    type: application
    platform: visionOS
    sources:
      - Sources
    dependencies:
      - package: DicyaninMockHandTracking
        product: DicyaninMockHandTracking
      - package: DicyaninMockHandTracking
        product: DicyaninHandGlove
    info:
      path: Generated/Info.plist
      properties:
        CFBundleDisplayName: Glove Demo
        UIApplicationSceneManifest:
          UIApplicationPreferredDefaultSceneSessionRole: UIWindowSceneSessionRoleApplication
          UISceneConfigurations: {}
        UILaunchScreen: {}
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.dicyanin.glovedemo
        GENERATE_INFOPLIST_FILE: NO
        TARGETED_DEVICE_FAMILY: "7"
        SWIFT_VERSION: "5.9"
        CODE_SIGNING_ALLOWED: NO
